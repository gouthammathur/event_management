<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - RGUKT Events</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: #0d1b2a;
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h2 {
  margin: 0;
}

/* BUTTON */
button {
  padding: 8px 15px;
  border: none;
  background: #c9a84c;
  cursor: pointer;
  font-weight: bold;
}

/* TABLE */
.container {
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
}

th {
  background: #0d1b2a;
  color: white;
}

tr:hover {
  background: #f1f1f1;
}

/* STATUS */
.loading {
  text-align: center;
  margin-top: 20px;
}
</style>
</head>

<body>
  <div id="loginPage" style="display:flex;justify-content:center;align-items:center;height:100vh;">
  <div style="background:white;padding:30px;border-radius:10px;width:300px;text-align:center;">
    <h2>Admin Login</h2>
    
    <input type="text" id="adminUser" placeholder="Username" style="width:100%;padding:10px;margin:10px 0;"><br>
    <input type="password" id="adminPass" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;"><br>
    
    <button onclick="login()">Login</button>
    <p id="errorMsg" style="color:red;"></p>
  </div>
</div>

<div id="adminPanel" style="display:none;">
  <!-- KEEP YOUR OLD ADMIN HTML HERE -->
</div>
<div id="adminPanel" style="display:none;">
   <!-- your header + table + script -->
</div>

<header>
  <h2>Admin Panel - Registrations</h2>
  <button onclick="loadData()">Refresh</button>
</header>

<div class="container">

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Roll</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Department</th>
        <th>Year</th>
        <th>Event</th>
        <th>Reg ID</th>
      </tr>
    </thead>
    <tbody id="tableData">
      <tr><td colspan="8">Loading...</td></tr>
    </tbody>
  </table>

</div>

<script>

async function loadData() {
  const table = document.getElementById("tableData");
  table.innerHTML = "<tr><td colspan='8'>Loading...</td></tr>";

  try {
    const res = await fetch("http://localhost:5000/registrations");
    const data = await res.json();

    if (data.length === 0) {
      table.innerHTML = "<tr><td colspan='8'>No registrations yet</td></tr>";
      return;
    }

    table.innerHTML = "";

    data.forEach(d => {
      table.innerHTML += `
        <tr>
          <td>${d.name}</td>
          <td>${d.roll}</td>
          <td>${d.email}</td>
          <td>${d.phone || "-"}</td>
          <td>${d.dept}</td>
          <td>${d.year}</td>
          <td>${d.event}</td>
          <td>${d.regId}</td>
        </tr>
      `;
    });

  } catch (err) {
    table.innerHTML = "<tr><td colspan='8'>Error loading data</td></tr>";
    console.error(err);
  }
}

// Load automatically
loadData();

</script>

</body>
</html>
<script>
function login() {
  const user = document.getElementById("adminUser").value;
  const pass = document.getElementById("adminPass").value;

  // Change these credentials
  const ADMIN_USER = "admin";
  const ADMIN_PASS = "2809";

  if (user === ADMIN_USER && pass === ADMIN_PASS) {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    document.getElementById("errorMsg").textContent = "Invalid username or password";
  }
}
</script>
