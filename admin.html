<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - RGUKT Events</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: #0d1b2a;
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h2 {
  margin: 0;
}

/* BUTTON */
button {
  padding: 8px 15px;
  border: none;
  background: #c9a84c;
  cursor: pointer;
  font-weight: bold;
}

/* TABLE */
.container {
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
}

th {
  background: #0d1b2a;
  color: white;
}

tr:hover {
  background: #f1f1f1;
}

/* STATUS */
.loading {
  text-align: center;
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" style="display:flex;justify-content:center;align-items:center;height:100vh;">
  <div style="background:white;padding:30px;border-radius:10px;width:300px;text-align:center;">
    <h2>Admin Login</h2>

    <input type="text" id="adminUser" placeholder="Username" style="width:100%;padding:10px;margin:10px 0;">
    <input type="password" id="adminPass" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

    <button onclick="login()">Login</button>
    <p id="errorMsg" style="color:red;"></p>
  </div>
</div>

<!-- ADMIN PANEL (NOW EVERYTHING INSIDE) -->
<div id="adminPanel" style="display:none;">

<header>
  <h2>Admin Panel - Registrations</h2>
  <button onclick="loadData()">Refresh</button>
</header>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Roll</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Department</th>
        <th>Year</th>
        <th>Event</th>
        <th>Reg ID</th>
        <th>Participation</th>
      </tr>
    </thead>

    <tbody id="tableData">
      <tr><td colspan="9">Loading...</td></tr>
    </tbody>
  </table>
</div>

</div>

<script>
async function loadData() {
  const tableBody = document.getElementById("tableData"); // ✅ FIXED

  try {
    tableBody.innerHTML = '<tr><td colspan="9">Loading...</td></tr>';

    console.log("Fetching data...");

    const response = await fetch("http://localhost:5000/registrations");

    console.log("Response status:", response.status);

    const data = await response.json();

    console.log("Data received:", data);

    if (!Array.isArray(data)) {
      tableBody.innerHTML = '<tr><td colspan="9">Invalid server response</td></tr>';
      return;
    }

    if (data.length === 0) {
      tableBody.innerHTML = '<tr><td colspan="9">No registrations found.</td></tr>';
      return;
    }

    tableBody.innerHTML = "";

    data.forEach(row => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${row.name || ""}</td>
        <td>${row.roll || ""}</td>
        <td>${row.email || ""}</td>
        <td>${row.phone || ""}</td>
        <td>${row.dept || ""}</td>
        <td>${row.year || ""}</td>
        <td>${row.event || ""}</td>
        <td>${row.regId || ""}</td>
        <td>${row.participation || ""}</td>
      `;

      tableBody.appendChild(tr);
    });

  } catch (err) {
    console.error("Error loading data:", err);
    document.getElementById("tableData").innerHTML =
      '<tr><td colspan="9" style="color:red;">Failed to load data. Check server</td></tr>';
  }
}

function login() {
  const user = document.getElementById("adminUser").value;
  const pass = document.getElementById("adminPass").value;

  if (user === "admin" && pass === "2809") {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadData();
  } else {
    document.getElementById("errorMsg").textContent = "Invalid username or password";
  }
}
</script>
</body>
</html>
