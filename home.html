<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGUKT Events</title>

<style>
body {
  font-family: Arial;
  margin: 0;
}

/* NAV */
nav {
  background: #0d1b2a;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

nav a {
  color: white;
  margin-left: 15px;
  cursor: pointer;
}

/* CARD */
.card {
  border: 1px solid #ccc;
  padding: 20px;
  margin: 20px;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal-box {
  background: white;
  padding: 20px;
  width: 300px;
}

/* SUCCESS */
.success {
  display: none;
  text-align: center;
}
.success.active {
  display: block;
}
</style>
</head>

<body>

<nav>
  <div>RGUKT Events</div>
  <div>
    <a onclick="scrollToSection('events')">Events</a>
  </div>
</nav>

<section id="events">
  <div class="card">
    <h3>ALVIDA 2026</h3>
    <button onclick="openRegister('Alvida 2026')">Register</button>
  </div>

  <div class="card">
    <h3>AROHANA 2026</h3>
    <button onclick="openRegister('Arohana 2026')">Register</button>
  </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <div id="formArea">
      <h3 id="eventTitle"></h3>

      <input id="name" placeholder="Name"><br><br>
      <input id="roll" placeholder="Roll"><br><br>
      <input id="email" placeholder="Email"><br><br>

      <button onclick="submitForm()">Submit</button>
      <button onclick="closeModal()">Cancel</button>
    </div>

    <div class="success" id="successBox">
      <h3>Registered!</h3>
      <p id="regId"></p>
      <button onclick="closeModal()">Done</button>
    </div>

  </div>
</div>

<script>

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

function openRegister(name){
  document.getElementById("modal").classList.add("active");
  document.getElementById("eventTitle").innerText = name;
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function submitForm(){

  const name = document.getElementById("name").value.trim();
  const roll = document.getElementById("roll").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!name || !roll || !email){
    alert("Fill all fields");
    return;
  }

  const data = {
    name,
    roll,
    email,
    event: document.getElementById("eventTitle").innerText
  };

  let list = JSON.parse(localStorage.getItem("registrations")) || [];
  list.push(data);
  localStorage.setItem("registrations", JSON.stringify(list));

  const id = "REG-" + Date.now();
  document.getElementById("regId").innerText = id;

  document.getElementById("formArea").style.display = "none";
  document.getElementById("successBox").classList.add("active");
}

</script>

</body>
</html>
